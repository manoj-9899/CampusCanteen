# Local PostgreSQL for demo (no cloud account required).
# Start: docker compose up -d
# Stop:  docker compose down

services:
  postgres:
    image: postgres:16-alpine
    container_name: campus-canteen-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: canteen
      POSTGRES_PASSWORD: canteen
      POSTGRES_DB: canteen
    ports:
      - "5432:5432"
    volumes:
      - canteen_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U canteen -d canteen"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  canteen_pg_data:
